name: contracts-guard

# Enforces the contracts/ change discipline that keeps the shared surface
# honest, and hard-locks the frozen artifacts once the contracts-v1 tag exists
# (odc-contracts, odc-service-boundaries).
#
# Runs on EVERY PR (no `paths:` filter) on purpose: the guard is a required
# status check, and GitHub leaves a path-skipped required check stuck in
# "Pending", which would block every PR that doesn't touch contracts/. Instead
# the job always runs and the script exits clean when no contracts/ file
# changed — so it is safe to mark required and only bites real contracts edits.
on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: contracts-guard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    name: guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so the diff base and the contracts-v1 freeze tag
          # are both resolvable.
          fetch-depth: 0
          fetch-tags: true
      - name: Guard contracts changes
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: bash .github/scripts/contracts-guard.sh
